# Docker 环境配置文件
# 此配置文件适用于 Docker Compose 部署环境

server:
  port: "8080"
  mode: "release"
  read_timeout: 60
  write_timeout: 60

database:
  driver: "mysql"
  host: "mysql"
  port: 3306
  username: "gateway"
  password: "gateway123"
  database: "ai_gateway"
  ssl_mode: "disable"

redis:
  host: "redis"
  port: 6379
  password: ""
  db: 0

clickhouse:
  host: "clickhouse"
  port: 8123
  database: "ai_gateway"
  username: "default"
  password: ""

jwt:
  secret: "your-secret-key-change-this-in-production"
  expires_in: 86400  # 24 hours

audit:
  off_hours_start: 22  # 22:00
  off_hours_end: 6     # 06:00
  token_threshold_hourly: 100000
  suspicious_ip_list:
    - "192.168.1.100"
  high_risk_prompt_patterns:
    - "ignore.*previous.*instruction"
    - "system.*prompt"
